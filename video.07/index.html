<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms - let's Learn it</title>
</head>
<body>
    <h1>Forms To Apply for - TA</h1>
    <div>
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" autofocus required>
    </div>
   
    <div>
        <input type="radio" id="male" name="gender" value="male">
        <label for="male">Male</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="female">Female</label>
        <input type="radio" id="female" name="gender" value="female">
        <label for="Other">Other</label>
    </div>
    
    <div>
         <input type="checkbox" id="subscribe" name="subscribe" value="yes">
            <label for="subscribe">Subscribe to newsletter</label>
    </div>

    div>
        <label for="country">Country:</label>
        <select id="country" name="country">
            <option value="usa">Russia</option>
            <option value="canada">China</option>
            <option value="uk">India</option>
            <option value="pakistan">Pakistan</option>
        </select>  

        <div>
            <textarea name="comment" rows="4" cols="50">Enter your comment here...
          </textarea>
        </div>

    <div>
     <select name="fruits">
      <option value="WAR">War</option>
      <option value="Gas Complain">Gas complain</option>
      <option value="Zindagi se hara hua insaan">kuch ni ho pa rh</option>
    </select>
    </div>
     
    <div>
        <button type="submit">Submit</button>
    </div>
</body>
</html>
